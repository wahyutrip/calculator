name: Debug OIDC claims
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  claims:
    runs-on: ubuntu-latest
    steps:
      - name: Print non-secret OIDC claims
        run: |
          # Only sub/aud/iss/repository are printed — never the signature.
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r .value)
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          PAD=$(( (4 - ${#PAYLOAD} % 4) % 4 ))
          PAYLOAD="$PAYLOAD$(printf '=%.0s' $(seq 1 $PAD))"
          echo "$PAYLOAD" | tr '_-' '/+' | base64 -d 2>/dev/null | jq '{sub, aud, iss, repository, environment, ref}'
