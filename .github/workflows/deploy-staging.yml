name: Deploy staging (AWS)

# Builds the web image, pushes it to ECR, and deploys to the shared dlhsby EC2
# host via SSM Run Command (no SSH keys anywhere). Auth is GitHub OIDC — no
# long-lived AWS credentials are stored.
#
# Release flow: open a PR from `main` -> `staging`. Merging it triggers this.
# The `staging` environment carries the approval gate and the dotenvx key.
#
# Required repo Variables (Settings -> Secrets and variables -> Actions -> Variables):
#   AWS_REGION       ap-southeast-3
#   AWS_ROLE_ARN     arn:aws:iam::659828096624:role/mm-gha-deploy
#   ECR_WEB          659828096624.dkr.ecr.ap-southeast-3.amazonaws.com/mm-web
#   EC2_INSTANCE_ID  i-08edccdc966c0985e
# Required Environment Secret (staging):
#   WEB_DOTENV_PRIVATE_KEY  decrypts infra/env/web/.env.staging at build time
#
# CO-TENANCY: this box also runs sekar, swat and portal. See
# specs/deployment/infrastructure.md — the rules there are not style preferences,
# each one has already caused an outage.

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  # Queue, never cancel. Cancelling mid `docker compose up` leaves the box in a
  # state nobody has reasoned about.
  group: deploy-staging
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'

jobs:
  # Re-run the full gate on the release commit itself.
  quality:
    uses: ./.github/workflows/ci.yml

  build-push:
    name: Build & push to ECR
    needs: quality
    runs-on: ubuntu-latest
    # Scoped to the staging environment so it can read the environment secret.
    # This is the SINGLE approval gate for a release — the deploy job below is not
    # environment-scoped, so a release is approved once, here, before any build.
    environment: staging
    permissions:
      id-token: write
      contents: read
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/Dockerfile.web
          platforms: linux/amd64
          push: true
          build-args: |
            DOTENV_ENV=staging
          # Mounted only for the build RUN, never written into an image layer.
          secrets: |
            dotenv_private_key=${{ secrets.WEB_DOTENV_PRIVATE_KEY }}
          tags: |
            ${{ vars.ECR_WEB }}:staging
            ${{ vars.ECR_WEB }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=mm-web
          cache-to: type=gha,mode=max,scope=mm-web

  deploy:
    name: Deploy to EC2 via SSM
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      SHA: ${{ needs.build-push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 infra/compose.prod.yml)
          CADDY_B64=$(base64 -w0 infra/calculator.caddy)

          BOX=$(cat <<EOF
          set -e
          mkdir -p /home/ec2-user/mm

          # Our vhost is a DROP-IN. The box Caddyfile is owned and regenerated by
          # sekar's deploy; anything appended there is wiped at their next release
          # (this has already taken swat down once). conf.d/ is never touched by
          # sekar, so a drop-in is clobber-proof.
          mkdir -p /home/ec2-user/sekar/infra/conf.d
          echo $CADDY_B64 | base64 -d > /home/ec2-user/sekar/infra/conf.d/calculator.caddy
          chown ec2-user:ec2-user /home/ec2-user/sekar/infra/conf.d/calculator.caddy

          echo $COMPOSE_B64 | base64 -d > /home/ec2-user/mm/compose.prod.yml
          chown -R ec2-user:ec2-user /home/ec2-user/mm

          # External so no single project's \\\`compose down\\\` can delete it.
          docker network create edge 2>/dev/null || true

          cd /home/ec2-user/mm
          export IMAGE_TAG=$SHA

          # Reclaim disk BEFORE pulling. The box accumulates one image set per
          # deploy across four projects and has hit "no space left on device"
          # mid-pull. Running containers keep their images, so this only drops
          # unused layers — never volumes or Caddy's certificates.
          docker image prune -af || true
          df -h / | tail -1

          docker compose -f compose.prod.yml pull --quiet
          docker compose -f compose.prod.yml up -d --force-recreate --wait

          # Reload, do NOT restart: adding a file to the bind-mounted conf.d/
          # directory does not swap the parent inode, so Caddy can pick it up with
          # zero downtime for sekar, swat and portal. Restarting would drop TLS
          # for all of them for a second or two.
          docker exec sekar-caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile \\
            || docker restart sekar-caddy

          # Fail loudly if the running container is not the SHA we just built —
          # otherwise a stale container would pass the smoke test.
          RUNNING=\\\$(docker inspect mm-web --format '{{.Config.Image}}')
          echo "running: \\\$RUNNING (expected tag \\\$IMAGE_TAG)"
          case "\\\$RUNNING" in *:\\\$IMAGE_TAG) echo "DEPLOY-VERIFIED \\\$IMAGE_TAG";; *) exit 1;; esac
          EOF
          )

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy mm-web $SHA" \
            --parameters commands="$BOX",executionTimeout=3600 \
            --query Command.CommandId --output text)
          echo "SSM command: $CMD_ID"

          for _ in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" \
              --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break;; esac
            sleep 5
          done

          aws ssm get-command-invocation --command-id "$CMD_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --query StandardOutputContent --output text || true
          aws ssm get-command-invocation --command-id "$CMD_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --query StandardErrorContent --output text || true

          test "$STATUS" = "Success"

      - name: Smoke test
        run: |
          set -euo pipefail
          BASE=https://calculator.wahyutrip.com

          # Give Caddy a moment to finish provisioning a first-issue certificate.
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "$BASE/" || echo 000)
            [ "$code" = "200" ] && break
            echo "attempt $i: HTTP $code"; sleep 10
          done
          test "$code" = "200"

          # The manifest check is not ceremony: a missing public/ copy in the image
          # breaks installability WITHOUT breaking the page, so the app looks
          # perfectly healthy while quietly ceasing to be a PWA. Only an explicit
          # assertion catches it.
          curl -fsS "$BASE/manifest.webmanifest" | grep -q LOTSIZE

          # A stale service worker pins users to an old build permanently and no
          # redeploy can reach them.
          curl -fsSI "$BASE/sw.js" | grep -qi 'must-revalidate'

          curl -fsS "$BASE/data/idx-tickers.json" | grep -q '"tickers"'
          echo "SMOKE OK"

      - name: Verify co-tenants are still healthy
        # We share this box with sekar, swat and portal. A deploy that takes one
        # of them down is a failed deploy even if our own app is fine.
        run: |
          set -uo pipefail
          fail=0
          for host in sekar.wahyutrip.com api.sekar.wahyutrip.com swat.wahyutrip.com; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "https://$host/" --max-time 20 || echo 000)
            echo "$host -> $code"
            case "$code" in 2*|3*|401|403|404) ;; *) fail=1;; esac
          done
          test "$fail" -eq 0
