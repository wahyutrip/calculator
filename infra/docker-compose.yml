# Local development infrastructure — PostgreSQL + Adminer.
#
# Phase 2 only. The MVP calculator computes in the browser and persists to
# localStorage, so `./scripts/start.sh` needs none of this. Use
# `./scripts/infra.sh` (or start.sh --with-be) to control it.
#
# Ports default to 5433/8081 rather than 5432/8080 because sekar and swat are
# developed on the same machine and already hold the standard ports.

name: mm-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: mm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mm_dev}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # The -d/-U flags matter: without them pg_isready checks the default
      # database and reports healthy before our database is actually created.
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mm_dev}']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: mm-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    ports:
      - '${ADMINER_PORT:-8081}:8080'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
